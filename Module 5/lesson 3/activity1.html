<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>JavaScript Array Sorting</h2>
        <p id="array">The Original Array:</p>
        <button onclick="ascending()">Ascending Order</button>
        <button onclick="descending()">Descending Order</button>
        <p id="sorted"></p>

        <script>
            var number = [5, 2, 9, 1, 5, 6]
            document.getElementById("array").innerHTML += number;

            function ascending() {
                number.sort(function(a,b){
                    return a-b;
                });
                document.getElementById("sorted").innerHTML = "Sorted in ascending order: " + number;
            }
            function descending() {
                number.sort(function(a,b){
                    return b - a;
                });
                document.getElementById("sorted").innerHTML = "Sorted in ascending order: " + number;
            }
        </script>
    </body>
</html>
