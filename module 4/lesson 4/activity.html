<!DOCTYPE html>
<html>
    <head></head>
    <body>
        <h2>Java Script Array</h2>
        <p id="array"></p>
        <p id="join"></p>
        <p id="pop"></p>

        <script>
            var cars = ["Lamborghini","Bugatti","Ferrari","BMW","Mercedes"]
            document.getElementById ("array"). innerHTML = cars;

            var join = cars.join("*")
            document.getElementById ("join"). innerHTML = join 

            var pop = cars.pop();
            document.getElementById ("pop"). innerHTML = cars 
        </script>
    </body>
</html>
